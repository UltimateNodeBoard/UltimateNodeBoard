version: "3.8"

services:

  mongodb:
    image: mongo:7
    container_name: unb-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: unb
      MONGO_INITDB_ROOT_PASSWORD: devpassword
      MONGO_INITDB_DATABASE: unb

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: